name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - server/**
      - deploy/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, vps-meet]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Test backend
        run: npm test

      - name: Build backend
        run: npm run build:server

      - name: Install backend on VPS
        run: |
          set -euo pipefail
          sudo mkdir -p /opt/meetteams/current /var/lib/meetteams
          sudo tee /opt/meetteams/.env >/dev/null <<'ENV'
          PORT=${{ vars.BACKEND_PORT || '8787' }}
          PUBLIC_ORIGIN=${{ vars.PUBLIC_ORIGIN || 'https://meet.app.amazing-ai.tools' }}
          MEETTEAMS_DATA_PATH=/var/lib/meetteams/meetteams.json
          SESSION_SECRET=${{ secrets.SESSION_SECRET || 'dev-session-secret' }}
          GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
          LIVEKIT_URL=${{ vars.LIVEKIT_URL || 'wss://livekit.meet.api.amazing-ai.tools' }}
          LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY || 'devkey' }}
          LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET || 'devsecret' }}
          ENV
          if [ -f "$HOME/meet.secrets" ]; then
            sudo sed -i '/^GOOGLE_CLIENT_ID=/d;/^GOOGLE_CLIENT_SECRET=/d;/^LIVEKIT_URL=/d;/^LIVEKIT_API_KEY=/d;/^LIVEKIT_API_SECRET=/d' /opt/meetteams/.env
            grep -E '^(GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET|LIVEKIT_URL|LIVEKIT_API_KEY|LIVEKIT_API_SECRET)=' "$HOME/meet.secrets" | sudo tee -a /opt/meetteams/.env >/dev/null
          fi
          sudo rsync -a --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .git \
            ./ /opt/meetteams/current/
          cd /opt/meetteams/current
          sudo npm ci --include=dev
          sudo npm run build:server
          sudo cp deploy/systemd/meetteams-backend.service /etc/systemd/system/meetteams-backend.service
          SERVICE_USER="$(id -un)"
          SERVICE_GROUP="$(id -gn)"
          NODE_BIN="/usr/bin/node"
          if [ ! -x "$NODE_BIN" ]; then
            NODE_BIN="$(command -v node)"
          fi
          sudo sed -i "s/^User=.*/User=${SERVICE_USER}/; s/^Group=.*/Group=${SERVICE_GROUP}/; s#^ExecStart=.*#ExecStart=${NODE_BIN} server/dist/index.js#" /etc/systemd/system/meetteams-backend.service
          sudo chown -R "${SERVICE_USER}:${SERVICE_GROUP}" /opt/meetteams /var/lib/meetteams
          sudo systemctl daemon-reload
          sudo systemctl enable meetteams-backend.service
          sudo systemctl restart meetteams-backend.service

      - name: Backend health check
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:${{ vars.BACKEND_PORT || '8787' }}/api/health; then
              exit 0
            fi
            sleep 1
          done
          sudo systemctl status meetteams-backend.service --no-pager || true
          sudo journalctl -u meetteams-backend.service -n 80 --no-pager || true
          exit 1
