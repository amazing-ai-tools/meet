services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    depends_on:
      - redis
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  redis-data:
